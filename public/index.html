<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Integration - Single & Bulk Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-down': 'slideDown 0.3s ease-out'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 mb-2">
                    Email Integration Platform
                </h1>
                <p class="text-gray-600">Send single emails or bulk emails with attachments</p>
            </div>

            <!-- Tab Navigation -->
            <div class="flex bg-white rounded-lg shadow-sm p-1 mb-8 max-w-md mx-auto">
                <button onclick="showTab('single')" id="singleTab" class="flex-1 py-2 px-4 text-center rounded-md font-medium transition-all duration-200 bg-blue-500 text-white">
                    Single Email
                </button>
                <button onclick="showTab('bulk')" id="bulkTab" class="flex-1 py-2 px-4 text-center rounded-md font-medium transition-all duration-200 text-gray-600 hover:text-gray-800">
                    Bulk Email
                </button>
            </div>

            <!-- Single Email Form -->
            <div id="singleForm" class="bg-white rounded-2xl shadow-xl p-8">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">Send Single Email</h2>
                <form action="/sendemail" method="POST" enctype="multipart/form-data">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Recipient Email</label>
                            <input type="email" name="to" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                                   placeholder="recipient@example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                            <input type="text" name="subject" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                                   placeholder="Email subject">
                        </div>
                    </div>
                    <div class="mt-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Message Body</label>
                        <textarea name="body" required rows="6"
                                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                                  placeholder="Your message content..."></textarea>
                    </div>
                    <div class="mt-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Attachment</label>
                        <input type="file" name="image" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
                    </div>
                    <button type="submit" class="w-full mt-8 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-300 transform hover:scale-105 hover:shadow-lg">
                        <span class="flex items-center justify-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                            Send Email
                        </span>
                    </button>
                </form>
            </div>

            <!-- Bulk Email Form -->
            <div id="bulkForm" class="bg-white rounded-2xl shadow-xl p-8 hidden">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">Send Bulk Emails</h2>
                <form action="/sendbulkemail" method="POST" enctype="multipart/form-data">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Recipients</label>
                            <textarea name="recipients" required rows="6"
                                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                                      placeholder="Enter email addresses (one per line):&#10;user1@example.com&#10;user2@example.com&#10;user3@example.com"></textarea>
                            <p class="text-sm text-gray-500 mt-1">Enter one email address per line</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                            <input type="text" name="subject" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                                   placeholder="Email subject for all recipients">

                            <div class="mt-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Attachment (Optional)</label>
                                <input type="file" name="image"
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
                            </div>
                        </div>
                    </div>
                    <div class="mt-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Message Body</label>
                        <textarea name="body" required rows="8"
                                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                                  placeholder="Your message content that will be sent to all recipients..."></textarea>
                    </div>

                    <!-- Bulk Email Options -->
                    <div class="mt-6 p-4 bg-gray-50 rounded-lg">
                        <h3 class="text-lg font-medium text-gray-800 mb-4">Bulk Email Options</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Delay Between Emails (seconds)</label>
                                <input type="number" name="delay" value="1" min="0" max="60"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <p class="text-xs text-gray-500 mt-1">Prevents rate limiting (0-60 seconds)</p>
                            </div>
                            <div class="flex items-center">
                                <input type="checkbox" name="personalize" id="personalize" value="true"
                                       class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                                <label for="personalize" class="ml-2 block text-sm text-gray-700">
                                    Personalize emails (use recipient's name if available)
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full mt-8 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-300 transform hover:scale-105 hover:shadow-lg">
                        <span class="flex items-center justify-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                            </svg>
                            Send Bulk Emails
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            const singleForm = document.getElementById('singleForm');
            const bulkForm = document.getElementById('bulkForm');
            const singleTab = document.getElementById('singleTab');
            const bulkTab = document.getElementById('bulkTab');

            if (tab === 'single') {
                singleForm.classList.remove('hidden');
                bulkForm.classList.add('hidden');
                singleTab.classList.add('bg-blue-500', 'text-white');
                singleTab.classList.remove('text-gray-600');
                bulkTab.classList.remove('bg-blue-500', 'text-white');
                bulkTab.classList.add('text-gray-600');
            } else {
                singleForm.classList.add('hidden');
                bulkForm.classList.remove('hidden');
                bulkTab.classList.add('bg-blue-500', 'text-white');
                bulkTab.classList.remove('text-gray-600');
                singleTab.classList.remove('bg-blue-500', 'text-white');
                singleTab.classList.add('text-gray-600');
            }
        }

        // Email validation for bulk recipients
        document.querySelector('textarea[name="recipients"]').addEventListener('blur', function() {
            const emails = this.value.split('\n').filter(email => email.trim());
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const invalidEmails = emails.filter(email => !emailRegex.test(email.trim()));

            if (invalidEmails.length > 0) {
                this.style.borderColor = '#ef4444';
                if (!document.getElementById('email-error')) {
                    const errorMsg = document.createElement('p');
                    errorMsg.id = 'email-error';
                    errorMsg.className = 'text-sm text-red-600 mt-1';
                    errorMsg.textContent = `Invalid email format: ${invalidEmails.join(', ')}`;
                    this.parentNode.appendChild(errorMsg);
                }
            } else {
                this.style.borderColor = '#d1d5db';
                const errorMsg = document.getElementById('email-error');
                if (errorMsg) errorMsg.remove();
            }
        });
    </script>
</body>
</html>
